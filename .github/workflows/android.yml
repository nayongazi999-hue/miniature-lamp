name: Build and Sign Play Store Release AAB

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Mobile Build Tools
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Prepare Web Directory
        run: |
          mkdir -p www
          rsync -av --exclude='.github' --exclude='android' --exclude='www' --exclude='package.json' --exclude='package-lock.json' ./ www/

      - name: Initialize Capacitor Project
        run: |
          npx cap init "NNG Quran Shobdo" "com.nngquran.shobdo" --web-dir=www
          npx cap add android

      - name: Absolute Custom Icon Overwrite
        run: |
          if [ -f "icon.png" ]; then
            RES_PATH="android/app/src/main/res"
            cp icon.png $RES_PATH/mipmap-mdpi/ic_launcher.png
            cp icon.png $RES_PATH/mipmap-mdpi/ic_launcher_round.png
            cp icon.png $RES_PATH/mipmap-hdpi/ic_launcher.png
            cp icon.png $RES_PATH/mipmap-hdpi/ic_launcher_round.png
            cp icon.png $RES_PATH/mipmap-xhdpi/ic_launcher.png
            cp icon.png $RES_PATH/mipmap-xhdpi/ic_launcher_round.png
            cp icon.png $RES_PATH/mipmap-xxhdpi/ic_launcher.png
            cp icon.png $RES_PATH/mipmap-xxhdpi/ic_launcher_round.png
            cp icon.png $RES_PATH/mipmap-xxxhdpi/ic_launcher.png
            cp icon.png $RES_PATH/mipmap-xxxhdpi/ic_launcher_round.png
            cp icon.png $RES_PATH/mipmap-mdpi/ic_launcher_foreground.png
            cp icon.png $RES_PATH/mipmap-hdpi/ic_launcher_foreground.png
            cp icon.png $RES_PATH/mipmap-xhdpi/ic_launcher_foreground.png
            cp icon.png $RES_PATH/mipmap-xxhdpi/ic_launcher_foreground.png
            cp icon.png $RES_PATH/mipmap-xxxhdpi/ic_launcher_foreground.png
          fi

      - name: Sync & Copy Files to Android
        run: |
          npx cap copy android
          npx cap sync

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Play Store Release Bundle (AAB)
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Generate Keystore & Sign AAB (For Play Store Verification)
        run: |
          # প্লে স্টোরের জন্য একটি সিকিউরিটি চাবি (Keystore) তৈরি করা হচ্ছে
          keytool -genkey -v -keystore my-release-key.keystore -alias my-key-alias -keyalg RSA -keysize 2048 -validity 10000 -storepass mysecretpassword -keypass mysecretpassword -dname "CN=NNG, OU=App, O=NNG, L=Dhaka, S=Dhaka, C=BD"
          
          # তৈরি হওয়া AAB ফাইলটি খুঁজে বের করে প্রধান পাতায় নিয়ে আসা হচ্ছে
          find android/ -name "*.aab" -exec cp {} ./app-release.aab \;
          
          # সিকিউরিটি চাবি দিয়ে ফাইলটি সাইন (লক) করা হচ্ছে
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore my-release-key.keystore -storepass mysecretpassword app-release.aab my-key-alias

      - name: Upload Signed AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-App-Release-AAB
          path: app-release.aab
          
