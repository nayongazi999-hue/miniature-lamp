name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Mobile Build Tools
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npm install -g @capacitor/assets

      - name: Prepare Web Directory
        run: |
          mkdir -p www
          rsync -av --exclude='.github' --exclude='android' --exclude='www' --exclude='package.json' --exclude='package-lock.json' ./ www/

      - name: Initialize Capacitor Project
        run: |
          npx cap init "NNG Quran Shobdo" "com.nngquran.shobdo" --web-dir=www
          npx cap add android

      - name: Create Resources & Generate Icons Directly
        run: |
          if [ -f "icon.png" ]; then
            # প্রথমে রুট ডিরেক্টরিতে এসেট ফোল্ডার তৈরি
            mkdir -p resources
            cp icon.png resources/icon.png
            
            # ক্যাপাসিটর এসেট দিয়ে আইকন তৈরি
            npx capacitor-assets generate --android
            
            # তৈরি হওয়া আইকনগুলো সরাসরি নেটিভ অ্যান্ড্রয়েডের মূল ফোল্ডারগুলোতে জোরপূর্বক প্রতিস্থাপন (Force Copy)
            cp -r resources/android/icon/* android/app/src/main/res/
          fi

      - name: Sync & Copy Files to Android
        run: |
          npx cap icon android
          npx cap copy android
          npx cap sync

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Android App (APK)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-App-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
