name: Build and Sign Play Store Release AAB

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Mobile Build Tools
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Prepare Web Directory
        run: |
          mkdir -p www
          rsync -av --exclude='.github' --exclude='android' --exclude='www' --exclude='package.json' --exclude='package-lock.json' ./ www/

      - name: Initialize Capacitor Project
        run: |
          npx cap init "NNG Quran Shobdo" "com.nngquran.shobdo" --web-dir=www
          node -e "
            const fs = require('fs');
            const cfgPath = 'capacitor.config.json';
            const cfg = JSON.parse(fs.readFileSync(cfgPath, 'utf8'));
            cfg.server = {
              url: 'https://nayongazi999-hue.github.io/miniature-lamp/',
              cleartext: false
            };
            fs.writeFileSync(cfgPath, JSON.stringify(cfg, null, 2));
          "
          npx cap add android

      - name: Disable WebView Cache (fixes stale content in app)
        run: |
          MAIN_ACTIVITY_PATH="android/app/src/main/java/com/nngquran/shobdo/MainActivity.java"
          cat > "$MAIN_ACTIVITY_PATH" << 'EOF'
          package com.nngquran.shobdo;

          import android.os.Bundle;
          import android.webkit.WebSettings;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
            @Override
            public void onCreate(Bundle savedInstanceState) {
              super.onCreate(savedInstanceState);
              // ✅ WebView-কে সবসময় নেটওয়ার্ক থেকে সর্বশেষ কনটেন্ট আনতে বাধ্য করা হলো,
              // যাতে নতুন ডিপ্লয় করা আপডেট অ্যাপে পুরনো ক্যাশড ভার্সন হিসেবে আটকে না থাকে
              this.bridge.getWebView().getSettings().setCacheMode(WebSettings.LOAD_NO_CACHE);
              this.bridge.getWebView().clearCache(true);
            }
          }
          EOF

      - name: Generate Padded App Icon (fixes cropped/zoomed logo)
        run: |
          if [ -f "icon.png" ]; then
            sudo apt-get update -y && sudo apt-get install -y imagemagick

            CANVAS=1024
            # লোগোটি ক্যানভাসের ৬৫% জায়গা জুড়ে থাকবে, বাকি অংশ ব্যাকগ্রাউন্ড কালার
            LOGO_SIZE=$(( CANVAS * 65 / 100 ))
            BG_COLOR="#0D1B2A"

            convert icon.png -resize ${LOGO_SIZE}x${LOGO_SIZE} \
              -background "$BG_COLOR" -gravity center -extent ${CANVAS}x${CANVAS} \
              padded_icon.png

            RES_PATH="android/app/src/main/res"

            declare -A SIZES=( [mdpi]=48 [hdpi]=72 [xhdpi]=96 [xxhdpi]=144 [xxxhdpi]=192 )
            for density in "${!SIZES[@]}"; do
              size=${SIZES[$density]}
              convert padded_icon.png -resize ${size}x${size} "$RES_PATH/mipmap-$density/ic_launcher.png"
              cp "$RES_PATH/mipmap-$density/ic_launcher.png" "$RES_PATH/mipmap-$density/ic_launcher_round.png"
              cp "$RES_PATH/mipmap-$density/ic_launcher.png" "$RES_PATH/mipmap-$density/ic_launcher_foreground.png"
            done
          fi

      - name: Sync & Copy Files to Android
        run: |
          npx cap copy android
          npx cap sync

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Debug APK (for direct install & testing)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Debug APK Artifact (installable on phone)
        uses: actions/upload-artifact@v4
        with:
          name: Debug-APK-For-Testing
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Build Play Store Release Bundle (AAB)
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Restore Persistent Keystore & Sign AAB
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # GitHub Secrets থেকে আসল কিস্টোরটি পুনরুদ্ধার করা হচ্ছে
          # (এটি প্রতিবার নতুন বানানো হয় না, একবারই বানিয়ে secret এ রাখা আছে)
          # মোবাইল থেকে কপি-পেস্ট করার সময় মাঝেমধ্যে স্পেস/লাইনব্রেক ঢুকে যায়, তাই সেগুলো বাদ দেওয়া হচ্ছে
          echo "$KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > my-release-key.keystore

          KEYSTORE_SIZE=$(wc -c < my-release-key.keystore)
          echo "Decoded keystore size: $KEYSTORE_SIZE bytes"
          if [ "$KEYSTORE_SIZE" -lt 1000 ]; then
            echo "::error::Keystore ফাইলটি অসম্পূর্ণ/করাপ্টেড মনে হচ্ছে (মাত্র $KEYSTORE_SIZE bytes)। KEYSTORE_BASE64 secret টি সম্ভবত কপি-পেস্টের সময় কাটা পড়েছে — keystore-base64.txt ফাইলটি Chrome এ খুলে পুরোটা আবার সিলেক্ট করে কপি করুন এবং secret টি নতুন করে বসান।"
            exit 1
          fi

          find android/ -name "*.aab" -exec cp {} ./app-release.aab \;

          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore my-release-key.keystore \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            app-release.aab "$KEY_ALIAS"

      - name: Upload Signed AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-App-Release-AAB
          path: app-release.aab
