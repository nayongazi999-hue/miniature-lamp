<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICL — Calling App</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#534AB7;--primary-light:#EEEDFE;--primary-mid:#AFA9EC;
  --primary-dark:#3C3489;--primary-deeper:#26215C;
  --online:#1D9E75;--online-light:#E1F5EE;
  --danger:#E24B4A;--danger-light:#FCEBEB;--warning:#EF9F27;
  --surface:#F8F7FF;--bg:#fff;--bg2:#F4F3FC;
  --border:rgba(83,74,183,0.12);--text:#1A1530;--text2:#6B648F;--text3:#A09CC0;
  --shadow:0 2px 16px rgba(83,74,183,0.10);--shadow-lg:0 8px 40px rgba(83,74,183,0.18);
  --radius:16px;--radius-sm:10px;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--surface);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
.screen{display:none;width:100%;min-height:calc(100vh - 60px);}
.screen.active{display:flex;}

/* ── TOPBAR ── */
.topbar{
  background:var(--bg);border-bottom:1px solid var(--border);
  padding:12px 20px;display:flex;align-items:center;gap:12px;
  flex-shrink:0;height:60px;
}
.topbar-logo{
  width:36px;height:36px;background:var(--primary);border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(83,74,183,0.3);
}
.topbar-logo svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;}
.topbar h1{font-size:16px;font-weight:600;color:var(--text);flex:1;}
.lang-selector{
  display:flex;align-items:center;gap:6px;
  background:var(--bg2);border:1px solid var(--border);border-radius:8px;
  padding:6px 10px;cursor:pointer;font-size:13px;color:var(--text2);
}
.lang-selector select{
  background:none;border:none;outline:none;
  font-family:var(--font);font-size:13px;color:var(--text2);cursor:pointer;
}

/* ── LOGIN SCREEN ── */
#login-screen{
  background:linear-gradient(145deg,#F0EFFD 0%,#E8E6FA 40%,#F4F3FC 100%);
  align-items:center;justify-content:flex-start;
  flex-direction:column;padding:20px;
}
.login-card{
  background:var(--bg);border-radius:24px;border:1px solid var(--border);
  padding:32px 28px;width:100%;max-width:400px;
  box-shadow:var(--shadow-lg);margin-top:20px;
  animation:slideUp 0.5s cubic-bezier(0.16,1,0.3,1);
}
@keyframes slideUp{
  from{opacity:0;transform:translateY(30px);}
  to{opacity:1;transform:translateY(0);}
}
.login-logo{
  width:48px;height:48px;background:var(--primary);border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  margin:0 0 16px;box-shadow:0 4px 16px rgba(83,74,183,0.35);
}
.login-logo svg{width:24px;height:24px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;}
.login-card h2{font-size:20px;font-weight:600;margin-bottom:4px;}
.login-card .subtitle{font-size:13px;color:var(--text2);margin-bottom:24px;}
.step{display:none;}.step.active{display:block;}
.form-label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px;margin-top:14px;display:block;}
.phone-row{display:flex;gap:8px;}

/* Country code button */
.country-code-btn{
  height:44px;min-width:90px;background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:0 10px;
  display:flex;align-items:center;gap:4px;
  font-family:var(--font);font-size:13px;color:var(--text);
  cursor:pointer;white-space:nowrap;flex-shrink:0;
  transition:border-color 0.2s;
}
.country-code-btn:hover{border-color:var(--primary);}
.country-code-btn .flag{font-size:16px;}
.country-code-btn .code{font-size:12px;color:var(--text2);}

input[type=tel],input[type=text],input[type=password]{
  width:100%;height:44px;border:1px solid var(--border);border-radius:var(--radius-sm);
  background:var(--bg2);font-family:var(--font);font-size:14px;color:var(--text);
  padding:0 14px;outline:none;transition:border-color 0.2s,box-shadow 0.2s;
}
input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(83,74,183,0.1);}
input::placeholder{color:var(--text3);}

.btn-primary{
  width:100%;height:46px;background:var(--primary);color:#fff;border:none;
  border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;font-weight:500;
  cursor:pointer;margin-top:16px;box-shadow:0 4px 16px rgba(83,74,183,0.3);
  transition:background 0.2s,transform 0.1s;
}
.btn-primary:hover{background:var(--primary-dark);}
.btn-primary:active{transform:scale(0.98);}

.divider{display:flex;align-items:center;gap:10px;margin:14px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.divider span{font-size:12px;color:var(--text3);}

.social-row{display:flex;gap:8px;}
.social-btn{
  flex:1;height:42px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);
  display:flex;align-items:center;justify-content:center;gap:6px;
  font-family:var(--font);font-size:13px;color:var(--text);cursor:pointer;
  transition:background 0.2s,border-color 0.2s;
}
.social-btn:hover{background:var(--primary-light);border-color:var(--primary-mid);}

.terms{font-size:11px;color:var(--text3);text-align:center;margin-top:14px;line-height:1.6;}
.terms a{color:var(--primary);text-decoration:none;}

/* OTP */
.otp-row{display:flex;gap:8px;justify-content:center;margin:16px 0;}
.otp-input{
  width:44px;height:52px;border:1.5px solid var(--border);border-radius:var(--radius-sm);
  background:var(--bg2);text-align:center;
  font-family:var(--mono);font-size:20px;font-weight:500;color:var(--primary-dark);
  outline:none;transition:border-color 0.2s,box-shadow 0.2s;
}
.otp-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(83,74,183,0.1);}

.back-link{
  background:none;border:none;cursor:pointer;color:var(--text2);
  font-family:var(--font);font-size:13px;margin-bottom:16px;
  display:inline-flex;align-items:center;gap:4px;padding:0;
}
.back-link:hover{color:var(--primary);}

.resend-row{text-align:center;font-size:13px;color:var(--text2);margin-top:12px;}
.resend-row a{color:var(--primary);cursor:pointer;}

.progress-dots{display:flex;gap:6px;justify-content:center;margin-bottom:18px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--primary-mid);transition:all 0.3s;}
.dot.active{background:var(--primary);width:18px;border-radius:3px;}

/* ── COUNTRY PICKER MODAL ── */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;
  align-items:flex-end;justify-content:center;
}
.modal-overlay.active{display:flex;}
.country-modal{
  background:var(--bg);border-radius:20px 20px 0 0;
  width:100%;max-width:480px;max-height:72vh;
  display:flex;flex-direction:column;padding-bottom:24px;
  animation:slideUp 0.3s cubic-bezier(0.16,1,0.3,1);
}
.modal-header{
  padding:16px 20px 10px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.modal-header h3{flex:1;font-size:16px;font-weight:500;}
.modal-close{
  background:none;border:none;cursor:pointer;
  color:var(--text3);font-size:20px;line-height:1;
  width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;transition:background 0.2s;
}
.modal-close:hover{background:var(--bg2);}
.modal-search{padding:10px 16px;}
.modal-search input{
  width:100%;height:40px;border:1px solid var(--border);border-radius:8px;
  background:var(--bg2);font-family:var(--font);font-size:14px;padding:0 12px;outline:none;
}
.modal-search input:focus{border-color:var(--primary);}
.country-list{overflow-y:auto;flex:1;}
.country-option{
  display:flex;align-items:center;gap:12px;padding:11px 20px;
  cursor:pointer;transition:background 0.15s;
}
.country-option:hover{background:var(--bg2);}
.country-option .flag{font-size:22px;flex-shrink:0;width:30px;text-align:center;}
.country-option .name{flex:1;font-size:14px;color:var(--text);}
.country-option .dial{font-size:13px;color:var(--text2);font-family:var(--mono);}

/* ── APP SCREEN ── */
#app-screen{flex-direction:column;}
.app-topbar{
  background:var(--bg);border-bottom:1px solid var(--border);
  padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.app-topbar h2{flex:1;font-size:16px;font-weight:600;}
.icon-btn{
  width:34px;height:34px;border-radius:8px;background:var(--bg2);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background 0.2s;
}
.icon-btn:hover{background:var(--primary-light);}
.icon-btn svg{width:18px;height:18px;fill:none;stroke:var(--text2);stroke-width:2;stroke-linecap:round;}

.tab-row{
  display:flex;gap:4px;padding:10px 16px 0;
  background:var(--bg);border-bottom:1px solid var(--border);
}
.tab{
  flex:1;height:32px;border-radius:8px;border:none;background:none;
  font-family:var(--font);font-size:12px;font-weight:500;color:var(--text3);cursor:pointer;
  transition:background 0.2s,color 0.2s;
}
.tab.active{background:var(--primary-light);color:var(--primary);}

.chat-list{overflow-y:auto;flex:1;padding:8px 0;}
.chat-item{
  display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;
  transition:background 0.15s;
}
.chat-item:hover{background:var(--bg2);}
.ci-avatar{
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:500;flex-shrink:0;position:relative;
}
.online-dot{
  position:absolute;bottom:1px;right:1px;width:10px;height:10px;
  border-radius:50%;background:var(--online);border:2px solid var(--bg);
}
.ci-info{flex:1;min-width:0;}
.ci-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ci-msg{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.ci-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.ci-time{font-size:11px;color:var(--text3);}
.ci-badge{
  background:var(--primary);color:#fff;font-size:10px;font-weight:500;
  width:18px;height:18px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}

/* ── RTL SUPPORT ── */
[dir=rtl] .phone-row{flex-direction:row-reverse;}
[dir=rtl] .ci-meta{align-items:flex-start;}
[dir=rtl] .back-link{flex-direction:row-reverse;}
[dir=rtl] .social-row{flex-direction:row-reverse;}
[dir=rtl] input{text-align:right;}
[dir=rtl] .otp-row{flex-direction:row-reverse;}
</style>
</head>
<body>

<!-- ══════════════════════════════
     TOP BAR — always visible
════════════════════════════════ -->
<div class="topbar">
  <div class="topbar-logo">
    <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.68A2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 14.92z"/></svg>
  </div>
  <h1 id="app-name">ICL — Calling App</h1>
  <div class="lang-selector">
    <span>🌐</span>
    <select id="lang-select" onchange="changeLanguage(this.value)">
      <option value="en">English</option>
      <option value="bn" selected>বাংলা</option>
      <option value="ar">العربية</option>
      <option value="zh">中文</option>
      <option value="hi">हिंदी</option>
      <option value="es">Español</option>
      <option value="fr">Français</option>
      <option value="pt">Português</option>
      <option value="ru">Русский</option>
      <option value="de">Deutsch</option>
      <option value="ja">日本語</option>
      <option value="ko">한국어</option>
      <option value="tr">Türkçe</option>
      <option value="id">Bahasa Indonesia</option>
      <option value="ms">Bahasa Melayu</option>
      <option value="fa">فارسی</option>
      <option value="ur">اردو</option>
      <option value="sw">Kiswahili</option>
      <option value="ha">Hausa</option>
    </select>
  </div>
</div>

<!-- ══════════════════════════════
     LOGIN SCREEN
════════════════════════════════ -->
<div id="login-screen" class="screen active">
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.68A2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 14.92z"/></svg>
    </div>

    <div class="progress-dots">
      <div class="dot active" id="dot1"></div>
      <div class="dot" id="dot2"></div>
      <div class="dot" id="dot3"></div>
    </div>

    <!-- STEP 1: Phone Number -->
    <div class="step active" id="step1">
      <h2 id="t-welcome">Welcome back</h2>
      <p class="subtitle" id="t-enter-phone">Enter your phone number to continue</p>

      <label class="form-label" id="t-phone-label">Phone number</label>
      <div class="phone-row">
        <button class="country-code-btn" id="cc-btn" onclick="openCountryPicker()">
          <span class="flag" id="selected-flag">🇧🇩</span>
          <span class="code" id="selected-code">+880</span>
          <svg width="10" height="6" viewBox="0 0 10 6" style="margin-left:2px">
            <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          </svg>
        </button>
        <input type="tel" id="t-phone-input" placeholder="01XXXXXXXXX" style="flex:1;">
      </div>

      <button class="btn-primary" id="t-continue-btn" onclick="goStep(2)">Continue →</button>

      <div class="divider"><span id="t-or">or</span></div>
      <div class="social-row">
        <button class="social-btn">
          <svg viewBox="0 0 24 24" width="16" height="16">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Google
        </button>
        <button class="social-btn">
          <svg viewBox="0 0 24 24" width="16" height="16">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" fill="#1877F2"/>
          </svg>
          Facebook
        </button>
      </div>
      <p class="terms" id="t-terms">By continuing, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a></p>
    </div>

    <!-- STEP 2: OTP Verification -->
    <div class="step" id="step2">
      <button class="back-link" onclick="goStep(1)">← <span id="t-back">Back</span></button>
      <h2 id="t-verify-title">Verify your number</h2>
      <p class="subtitle" id="t-otp-sent">We sent a 6-digit code to your number</p>
      <div class="otp-row">
        <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
        <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
        <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
        <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
        <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
        <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
      </div>
      <button class="btn-primary" id="t-verify-btn" onclick="goStep(3)">Verify &amp; Continue</button>
      <div class="resend-row">
        <span id="t-no-code">Didn't receive it?</span>
        <a id="t-resend"> Resend</a>
      </div>
    </div>

    <!-- STEP 3: Profile Setup -->
    <div class="step" id="step3">
      <button class="back-link" onclick="goStep(2)">← <span id="t-back2">Back</span></button>
      <h2 id="t-profile-title">Set up your profile</h2>
      <p class="subtitle" id="t-profile-sub">This is how others will see you</p>
      <label class="form-label" id="t-name-label">Full name</label>
      <input type="text" id="t-name-input" placeholder="Your name">
      <label class="form-label" id="t-username-label">Username</label>
      <input type="text" id="t-username-input" placeholder="@username">
      <button class="btn-primary" id="t-finish-btn" onclick="showApp()">Get Started 🎉</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════
     MAIN APP SCREEN
════════════════════════════════ -->
<div id="app-screen" class="screen">
  <div class="app-topbar">
    <h2 id="t-messages">Messages</h2>
    <div class="icon-btn">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    </div>
    <div class="icon-btn" title="Sign out" onclick="showLogin()">
      <svg viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
    </div>
  </div>
  <div class="tab-row">
    <button class="tab active" id="t-tab-all">All</button>
    <button class="tab" id="t-tab-calls">Calls</button>
    <button class="tab" id="t-tab-groups">Groups</button>
  </div>
  <div class="chat-list" id="chat-list"></div>
</div>

<!-- ══════════════════════════════
     COUNTRY PICKER MODAL
════════════════════════════════ -->
<div class="modal-overlay" id="country-modal" onclick="closeCountryPicker(event)">
  <div class="country-modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="t-select-country">Select Country</h3>
      <button class="modal-close" onclick="closeCountryPicker()">✕</button>
    </div>
    <div class="modal-search">
      <input type="text" id="country-search"
             placeholder="Search country..."
             oninput="filterCountries(this.value)">
    </div>
    <div class="country-list" id="country-list"></div>
  </div>
</div>

<!-- ══════════════════════════════
     JAVASCRIPT
════════════════════════════════ -->
<script>
/* ─────────── i18n Translations ─────────── */

/* ─────────── State ─────────── */
let currentLang = 'bn';
let currentStep = 1;

/* ─────────── Translation helpers ─────────── */
function t(key){ return (i18n[currentLang]||i18n.en)[key] || i18n.en[key] || key; }

function changeLanguage(lang) {
  currentLang = lang;
  const dir = (i18n[lang]||i18n.en).dir;
  document.documentElement.setAttribute('dir', dir);
  applyTranslations();
}

function applyTranslations() {
  const map = {
    't-welcome':'welcome','t-enter-phone':'enterPhone','t-phone-label':'phoneLabel',
    't-continue-btn':'continueBtn','t-or':'or',
    't-back':'back','t-back2':'back',
    't-verify-title':'verifyTitle','t-otp-sent':'otpSent','t-verify-btn':'verifyBtn',
    't-no-code':'noCode','t-resend':'resend',
    't-profile-title':'profileTitle','t-profile-sub':'profileSub',
    't-name-label':'nameLabel','t-username-label':'usernameLabel','t-finish-btn':'finishBtn',
    't-messages':'messages','t-tab-all':'tabAll','t-tab-calls':'tabCalls','t-tab-groups':'tabGroups',
    't-select-country':'selectCountry'
  };
  for (const [id, key] of Object.entries(map)) {
    const el = document.getElementById(id);
    if (el) el.textContent = t(key);
  }
  // Placeholders
  const ph = {
    't-phone-input':'phonePh','t-name-input':'namePh','t-username-input':'usernamePh',
    'country-search':'searchPh'
  };
  for (const [id, key] of Object.entries(ph)) {
    const el = document.getElementById(id);
    if (el) el.placeholder = t(key);
  }
  renderContacts();
}

/* ─────────── Step navigation ─────────── */
function goStep(n) {
  document.getElementById('step'+currentStep).classList.remove('active');
  document.getElementById('dot'+currentStep).classList.remove('active');
  currentStep = n;
  document.getElementById('step'+n).classList.add('active');
  document.getElementById('dot'+n).classList.add('active');
}

/* ─────────── Screen navigation ─────────── */
function showApp() {
  document.getElementById('login-screen').classList.remove('active');
  document.getElementById('app-screen').classList.add('active');
  renderContacts();
}
function showLogin() {
  document.getElementById('app-screen').classList.remove('active');
  document.getElementById('login-screen').classList.add('active');
}

/* ─────────── Country picker ─────────── */
function openCountryPicker() {
  renderCountryList(countries);
  document.getElementById('country-modal').classList.add('active');
}
function closeCountryPicker(e) {
  if (!e || e.target === document.getElementById('country-modal'))
    document.getElementById('country-modal').classList.remove('active');
}
function renderCountryList(list) {
  document.getElementById('country-list').innerHTML = list.map(c => `
    <div class="country-option" onclick="selectCountry('${c.flag}','${c.code}')">
      <span class="flag">${c.flag}</span>
      <span class="name">${c.name}</span>
      <span class="dial">${c.code}</span>
    </div>`).join('');
}
function filterCountries(q) {
  const f = countries.filter(c =>
    c.name.toLowerCase().includes(q.toLowerCase()) || c.code.includes(q)
  );
  renderCountryList(f);
}
function selectCountry(flag, code) {
  document.getElementById('selected-flag').textContent = flag;
  document.getElementById('selected-code').textContent = code;
  document.getElementById('country-modal').classList.remove('active');
  document.getElementById('country-search').value = '';
  renderCountryList(countries);
}

/* ─────────── Contacts list ─────────── */
function renderContacts() {
  const cl = document.getElementById('chat-list');
  if (!cl) return;
  cl.innerHTML = contacts.map(c => `
    <div class="chat-item">
      <div class="ci-avatar" style="background:${c.color};color:${c.tc}">
        ${c.initials}
        ${c.online ? '<div class="online-dot"></div>' : ''}
      </div>
      <div class="ci-info">
        <div class="ci-name">${c.name}</div>
        <div class="ci-msg">${c.call ? '📞 ' + c.msg : c.msg}</div>
      </div>
      <div class="ci-meta">
        <div class="ci-time">${c.time}</div>
        ${c.badge ? `<div class="ci-badge">${c.badge}</div>` : ''}
      </div>
    </div>`).join('');
}

/* ─────────── OTP auto-advance ─────────── */
document.querySelectorAll('.otp-input').forEach((inp, i, all) => {
  inp.addEventListener('input', () => { if (inp.value && i < all.length - 1) all[i+1].focus(); });
  inp.addEventListener('keydown', e => { if (e.key === 'Backspace' && !inp.value && i > 0) all[i-1].focus(); });
});

/* ─────────── Init ─────────── */
renderCountryList(countries);
changeLanguage('bn');
</script>
