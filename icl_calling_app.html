<!DOCTYPE html>
<html lang="bn" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICL — Calling App</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#534AB7;--primary-light:#EEEDFE;--primary-mid:#AFA9EC;
  --primary-dark:#3C3489;
  --online:#1D9E75;--online-light:#E1F5EE;
  --danger:#E24B4A;--danger-light:#FCEBEB;
  --surface:#F8F7FF;--bg:#fff;--bg2:#F4F3FC;
  --border:rgba(83,74,183,0.12);--text:#1A1530;--text2:#6B648F;--text3:#A09CC0;
  --shadow-lg:0 8px 40px rgba(83,74,183,0.18);
  --radius-sm:10px;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--surface);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
.screen{display:none;width:100%;min-height:calc(100vh - 60px);}
.screen.active{display:flex;}

.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;height:60px;}
.topbar-logo{width:36px;height:36px;background:var(--primary);border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(83,74,183,0.3);}
.topbar-logo svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;}
.topbar h1{font-size:16px;font-weight:600;color:var(--text);flex:1;}

#login-screen{background:linear-gradient(145deg,#F0EFFD 0%,#E8E6FA 40%,#F4F3FC 100%);align-items:center;justify-content:flex-start;flex-direction:column;padding:20px;}
.login-card{background:var(--bg);border-radius:24px;border:1px solid var(--border);padding:32px 28px;width:100%;max-width:400px;box-shadow:var(--shadow-lg);margin-top:20px;animation:slideUp 0.5s cubic-bezier(0.16,1,0.3,1);}
@keyframes slideUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
.login-logo{width:48px;height:48px;background:var(--primary);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 0 16px;box-shadow:0 4px 16px rgba(83,74,183,0.35);}
.login-logo svg{width:24px;height:24px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;}
.login-card h2{font-size:20px;font-weight:600;margin-bottom:4px;}
.login-card .subtitle{font-size:13px;color:var(--text2);margin-bottom:20px;}
.step{display:none;}.step.active{display:block;}
.form-label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px;margin-top:14px;display:block;}
input[type=email],input[type=text],input[type=password]{width:100%;height:44px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg2);font-family:var(--font);font-size:14px;color:var(--text);padding:0 14px;outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(83,74,183,0.1);}
input::placeholder{color:var(--text3);}
.btn-primary{width:100%;height:46px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;margin-top:14px;box-shadow:0 4px 16px rgba(83,74,183,0.3);transition:background 0.2s,transform 0.1s;}
.btn-primary:hover{background:var(--primary-dark);}
.btn-primary:active{transform:scale(0.98);}
.btn-primary:disabled{background:var(--primary-mid);cursor:not-allowed;}
.btn-google{width:100%;height:46px;background:#fff;color:#3c4043;border:1.5px solid #dadce0;border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:10px;transition:background 0.2s,box-shadow 0.2s;}
.btn-google:hover{background:#f8f9fa;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.btn-google svg{width:18px;height:18px;flex-shrink:0;}
.msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-top:10px;display:none;}
.msg.error{background:var(--danger-light);color:var(--danger);}
.msg.success{background:var(--online-light);color:var(--online);}
.msg.show{display:block;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;margin-right:8px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
.back-link{background:none;border:none;cursor:pointer;color:var(--text2);font-family:var(--font);font-size:13px;margin-bottom:16px;display:inline-flex;align-items:center;gap:4px;padding:0;}
.back-link:hover{color:var(--primary);}
.divider{display:flex;align-items:center;gap:10px;margin:16px 0 4px;color:var(--text3);font-size:12px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.toggle-link{text-align:center;font-size:13px;color:var(--text2);margin-top:16px;}
.toggle-link a{color:var(--primary);cursor:pointer;font-weight:500;}
.terms{font-size:11px;color:var(--text3);text-align:center;margin-top:14px;line-height:1.6;}
.terms a{color:var(--primary);text-decoration:none;}
.progress-dots{display:flex;gap:6px;justify-content:center;margin-bottom:18px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--primary-mid);transition:all 0.3s;}
.dot.active{background:var(--primary);width:18px;border-radius:3px;}

/* Mode toggle tabs */
.mode-tabs{display:flex;gap:4px;background:var(--bg2);border-radius:10px;padding:4px;margin-bottom:20px;}
.mode-tab{flex:1;height:34px;border-radius:7px;border:none;background:none;font-family:var(--font);font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all 0.2s;}
.mode-tab.active{background:var(--bg);color:var(--primary);box-shadow:0 1px 6px rgba(83,74,183,0.12);}

#app-screen{flex-direction:column;}
.app-topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.app-topbar h2{flex:1;font-size:16px;font-weight:600;}
.icon-btn{width:34px;height:34px;border-radius:8px;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background 0.2s;}
.icon-btn svg{width:18px;height:18px;fill:none;stroke:var(--text2);stroke-width:2;stroke-linecap:round;}
.tab-row{display:flex;gap:4px;padding:10px 16px 0;background:var(--bg);border-bottom:1px solid var(--border);}
.tab{flex:1;height:32px;border-radius:8px;border:none;background:none;font-family:var(--font);font-size:12px;font-weight:500;color:var(--text3);cursor:pointer;}
.tab.active{background:var(--primary-light);color:var(--primary);}
.chat-list{overflow-y:auto;flex:1;padding:8px 0;}
.chat-item{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;transition:background 0.15s;}
.chat-item:hover{background:var(--bg2);}
.ci-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;flex-shrink:0;position:relative;}
.online-dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;background:var(--online);border:2px solid var(--bg);}
.ci-info{flex:1;min-width:0;}
.ci-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ci-msg{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.ci-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.ci-time{font-size:11px;color:var(--text3);}
.ci-badge{background:var(--primary);color:#fff;font-size:10px;font-weight:500;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">
    <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.68A2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 14.92z"/></svg>
  </div>
  <h1>ICL — Calling App</h1>
</div>

<!-- LOGIN SCREEN -->
<div id="login-screen" class="screen active">
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.68A2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 14.92z"/></svg>
    </div>
    <div class="progress-dots">
      <div class="dot active" id="dot1"></div>
      <div class="dot" id="dot2"></div>
    </div>

    <!-- STEP 1: Login / Register -->
    <div class="step active" id="step1">
      <h2 id="auth-title">স্বাগতম</h2>
      <p class="subtitle" id="auth-subtitle">আপনার অ্যাকাউন্টে প্রবেশ করুন</p>

      <!-- Mode Tabs -->
      <div class="mode-tabs">
        <button class="mode-tab active" id="tab-login" onclick="switchMode('login')">লগিন</button>
        <button class="mode-tab" id="tab-register" onclick="switchMode('register')">নিবন্ধন</button>
      </div>

      <label class="form-label">ইমেইল ঠিকানা</label>
      <input type="email" id="email-input" placeholder="example@gmail.com">

      <label class="form-label">পাসওয়ার্ড</label>
      <input type="password" id="password-input" placeholder="••••••••">

      <div id="name-field" style="display:none;">
        <label class="form-label">পূর্ণ নাম</label>
        <input type="text" id="name-input-auth" placeholder="আপনার নাম">
      </div>

      <div class="msg error" id="auth-error"></div>
      <div class="msg success" id="auth-success"></div>

      <button class="btn-primary" id="auth-btn" onclick="handleAuth()">লগিন করুন</button>

      <div class="divider">অথবা</div>

      <button class="btn-google" id="google-btn" onclick="handleGoogleLogin()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Google দিয়ে লগিন
      </button>

      <p class="terms">চালিয়ে গেলে আপনি আমাদের <a href="#">শর্তাবলী</a> এবং <a href="#">গোপনীয়তা নীতিতে</a> সম্মত হচ্ছেন</p>
    </div>

    <!-- STEP 2: Profile Setup -->
    <div class="step" id="step2">
      <button class="back-link" onclick="goStep(1)">← পেছনে</button>
      <h2>প্রোফাইল সেট করুন</h2>
      <p class="subtitle">অন্যরা আপনাকে এভাবে দেখবে</p>
      <label class="form-label">পূর্ণ নাম</label>
      <input type="text" id="name-input" placeholder="আপনার নাম">
      <label class="form-label">ইউজারনেম</label>
      <input type="text" id="username-input" placeholder="@ইউজারনেম">
      <button class="btn-primary" onclick="showApp()">শুরু করুন 🎉</button>
    </div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="app-screen" class="screen">
  <div class="app-topbar">
    <h2>বার্তাসমূহ</h2>
    <div class="icon-btn">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    </div>
    <div class="icon-btn" onclick="doSignOut()">
      <svg viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
    </div>
  </div>
  <div class="tab-row">
    <button class="tab active">সব</button>
    <button class="tab">কল</button>
    <button class="tab">গ্রুপ</button>
  </div>
  <div class="chat-list" id="chat-list"></div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup,
  signOut as fbSignOut,
  onAuthStateChanged,
  updateProfile
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB6Ff_tfdoy3SX7-KRMurDBDsC8AzcTRK4",
  authDomain: "qoraner-varb-200-3367a.firebaseapp.com",
  databaseURL: "https://qoraner-varb-200-3367a-default-rtdb.firebaseio.com",
  projectId: "qoraner-varb-200-3367a",
  storageBucket: "qoraner-varb-200-3367a.firebasestorage.app",
  messagingSenderId: "26016266391",
  appId: "1:26016266391:web:39c2c833060a83047551d2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// Auth state
onAuthStateChanged(auth, (user) => {
  if (user) {
    showApp();
  }
});

// Current mode
let currentMode = 'login';

window.switchMode = function(mode) {
  currentMode = mode;
  const nameField = document.getElementById('name-field');
  const authTitle = document.getElementById('auth-title');
  const authSubtitle = document.getElementById('auth-subtitle');
  const authBtn = document.getElementById('auth-btn');
  const tabLogin = document.getElementById('tab-login');
  const tabReg = document.getElementById('tab-register');

  if (mode === 'login') {
    nameField.style.display = 'none';
    authTitle.textContent = 'স্বাগতম';
    authSubtitle.textContent = 'আপনার অ্যাকাউন্টে প্রবেশ করুন';
    authBtn.textContent = 'লগিন করুন';
    tabLogin.classList.add('active');
    tabReg.classList.remove('active');
  } else {
    nameField.style.display = 'block';
    authTitle.textContent = 'নতুন অ্যাকাউন্ট';
    authSubtitle.textContent = 'বিনামূল্যে অ্যাকাউন্ট তৈরি করুন';
    authBtn.textContent = 'নিবন্ধন করুন';
    tabLogin.classList.remove('active');
    tabReg.classList.add('active');
  }
  clearMsgs();
};

window.handleAuth = async function() {
  const email = document.getElementById('email-input').value.trim();
  const password = document.getElementById('password-input').value;
  const btn = document.getElementById('auth-btn');

  if (!email || !email.includes('@')) {
    showMsg('auth-error', 'সঠিক ইমেইল ঠিকানা দিন');
    return;
  }
  if (password.length < 6) {
    showMsg('auth-error', 'পাসওয়ার্ড কমপক্ষে ৬ অক্ষরের হতে হবে');
    return;
  }

  const origText = btn.textContent;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>অপেক্ষা করুন...';

  try {
    if (currentMode === 'login') {
      await signInWithEmailAndPassword(auth, email, password);
    } else {
      const name = document.getElementById('name-input-auth').value.trim();
      if (!name) {
        showMsg('auth-error', 'আপনার নাম দিন');
        btn.disabled = false;
        btn.textContent = origText;
        return;
      }
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(cred.user, { displayName: name });
      showMsg('auth-success', '✅ অ্যাকাউন্ট তৈরি হয়েছে!');
    }
  } catch (err) {
    let msg = 'কিছু সমস্যা হয়েছে। আবার চেষ্টা করুন।';
    if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
      msg = 'ইমেইল বা পাসওয়ার্ড সঠিক নয়';
    } else if (err.code === 'auth/email-already-in-use') {
      msg = 'এই ইমেইলে আগেই অ্যাকাউন্ট আছে। লগিন করুন।';
    } else if (err.code === 'auth/weak-password') {
      msg = 'পাসওয়ার্ড আরও শক্তিশালী করুন';
    } else if (err.code === 'auth/too-many-requests') {
      msg = 'অনেকবার চেষ্টা হয়েছে। কিছুক্ষণ পরে আবার চেষ্টা করুন।';
    }
    showMsg('auth-error', msg);
  } finally {
    btn.disabled = false;
    btn.textContent = origText;
  }
};

window.handleGoogleLogin = async function() {
  const btn = document.getElementById('google-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner" style="border-top-color:var(--primary)"></span>Google লগিন হচ্ছে...';
  try {
    await signInWithPopup(auth, provider);
  } catch (err) {
    let msg = 'Google লগিন ব্যর্থ হয়েছে।';
    if (err.code === 'auth/popup-closed-by-user') {
      msg = 'লগিন বাতিল করা হয়েছে।';
    } else if (err.code === 'auth/popup-blocked') {
      msg = 'Popup block হয়েছে। Browser এ popup allow করুন।';
    }
    showMsg('auth-error', msg);
    btn.disabled = false;
    btn.innerHTML = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="18" height="18"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> Google দিয়ে লগিন`;
  }
};

window.doSignOut = async function() {
  await fbSignOut(auth);
  location.reload();
};

function showMsg(id, msg) {
  clearMsgs();
  const el = document.getElementById(id);
  if (el) {
    el.textContent = msg;
    el.classList.add('show');
  }
}
function clearMsgs() {
  ['auth-error','auth-success'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('show');
  });
}
</script>

<script>
function goStep(n) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById('step' + n).classList.add('active');
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i < n);
  });
}

function showApp() {
  document.getElementById('login-screen').classList.remove('active');
  document.getElementById('app-screen').classList.add('active');
  loadChats();
}

function loadChats() {
  const chats = [
    {name:'রহিম ভাই',msg:'আজকে কল করবেন?',time:'১০:৩০',badge:2,color:'#534AB7',online:true},
    {name:'করিম',msg:'ঠিক আছে, পরে কথা হবে',time:'৯:১৫',badge:0,color:'#1D9E75',online:false},
    {name:'ICL Support',msg:'আপনার সমস্যা সমাধান হয়েছে',time:'গতকাল',badge:1,color:'#EF9F27',online:true},
    {name:'মা',msg:'বাসায় কখন আসবি?',time:'গতকাল',badge:3,color:'#E24B4A',online:false},
    {name:'অফিস গ্রুপ',msg:'মিটিং ৩টায়',time:'সোমবার',badge:0,color:'#534AB7',online:false},
  ];
  const list = document.getElementById('chat-list');
  list.innerHTML = chats.map(c => `
    <div class="chat-item">
      <div class="ci-avatar" style="background:${c.color}20;color:${c.color}">
        ${c.name[0]}
        ${c.online ? '<div class="online-dot"></div>' : ''}
      </div>
      <div class="ci-info">
        <div class="ci-name">${c.name}</div>
        <div class="ci-msg">${c.msg}</div>
      </div>
      <div class="ci-meta">
        <span class="ci-time">${c.time}</span>
        ${c.badge ? `<div class="ci-badge">${c.badge}</div>` : ''}
      </div>
    </div>
  `).join('');
}
</script>
